name: V1 Validation

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deployment-config:
    name: Deployment config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate V1 test environment compose file
        run: docker compose -f compose.v1-test.yml config

      - name: Validate V1 deployment image override config
        run: node scripts/v1-deployment-config-check.mjs

      - name: Run V1 deployment config checker tests
        run: node --test scripts/v1-deployment-config-check.test.mjs

      - name: Validate V1 RC/UAT readiness evidence
        run: node scripts/v1-uat-readiness-check.mjs

      - name: Run V1 UAT evidence pack generator tests
        run: node --test scripts/v1-uat-evidence-pack.test.mjs

      - name: Run V1 UAT evidence pack validator tests
        run: node --test scripts/v1-uat-evidence-pack-validate.test.mjs

      - name: Run V1 UAT environment evidence validator tests
        run: node --test scripts/v1-uat-environment-validate.test.mjs

      - name: Run V1 UAT defect register validator tests
        run: node --test scripts/v1-uat-defect-register-validate.test.mjs

      - name: Run V1 UAT signoff register validator tests
        run: node --test scripts/v1-uat-signoff-register-validate.test.mjs

      - name: Run V1 UAT evidence manifest validator tests
        run: node --test scripts/v1-uat-evidence-manifest-validate.test.mjs

      - name: Run V1 UAT execution tracker validator tests
        run: node --test scripts/v1-uat-execution-tracker-validate.test.mjs

      - name: Run V1 release gate tests
        run: node --test scripts/v1-release-gate.test.mjs

      - name: Run V1 validation status report tests
        run: node --test scripts/v1-validation-status.test.mjs

      - name: Run V1 UAT action plan tests
        run: node --test scripts/v1-uat-action-plan.test.mjs

      - name: Run V1 UAT execution pack tests
        run: node --test scripts/v1-uat-execution-pack.test.mjs

      - name: Run V1 Go No-Go meeting pack tests
        run: node --test scripts/v1-go-no-go-meeting.test.mjs

      - name: Validate V1 UAT evidence pack generator
        run: node scripts/v1-uat-evidence-pack.mjs --environment ci-v1-uat-template --frontend-url https://crm.example.invalid --backend-url https://crm-api.example.invalid --git-commit "$GITHUB_SHA" --rc ci-snapshot --test-owner QA --product-owner Product --dev-owner Dev --username demo_admin

  backend:
    name: Backend tests and PostgreSQL migration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend test suite
        run: mvn -B test

      - name: Run PostgreSQL integration verification
        run: mvn -B verify -Ppostgres-it

  frontend:
    name: Frontend tests and production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend test suite
        run: npm test

      - name: Run V1 readiness checker tests
        run: node --test ../scripts/v1-uat-readiness-check.test.mjs

      - name: Build frontend
        run: npm run build
