name: V1 Validation

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deployment-config:
    name: Deployment config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate V1 test environment compose file
        run: docker compose -f compose.v1-test.yml config

      - name: Validate V1 deployment image override config
        run: node scripts/v1-deployment-config-check.mjs

      - name: Run V1 deployment config checker tests
        run: node --test scripts/v1-deployment-config-check.test.mjs

      - name: Run complete V1 scripts test suite
        run: node --test scripts/*.test.mjs

      - name: Validate V1 RC/UAT readiness evidence
        run: node scripts/v1-uat-readiness-check.mjs

      - name: Run V1 UAT evidence pack generator tests
        run: node --test scripts/v1-uat-evidence-pack.test.mjs

      - name: Run V1 UAT evidence pack validator tests
        run: node --test scripts/v1-uat-evidence-pack-validate.test.mjs

      - name: Run V1 UAT environment evidence validator tests
        run: node --test scripts/v1-uat-environment-validate.test.mjs

      - name: Run V1 UAT defect register validator tests
        run: node --test scripts/v1-uat-defect-register-validate.test.mjs

      - name: Run V1 UAT signoff register validator tests
        run: node --test scripts/v1-uat-signoff-register-validate.test.mjs

      - name: Run V1 kickoff governance validator tests
        run: node --test scripts/v1-kickoff-governance-validate.test.mjs

      - name: Run V1 UAT launch intake validator tests
        run: node --test scripts/v1-uat-launch-intake-validate.test.mjs

      - name: Run V1 UAT evidence manifest validator tests
        run: node --test scripts/v1-uat-evidence-manifest-validate.test.mjs

      - name: Run V1 evidence reference checker tests
        run: node --test scripts/v1-evidence-reference-check.test.mjs

      - name: Validate V1 evidence references
        run: node scripts/v1-evidence-reference-check.mjs

      - name: Run V1 UAT execution tracker validator tests
        run: node --test scripts/v1-uat-execution-tracker-validate.test.mjs

      - name: Run V1 release gate tests
        run: node --test scripts/v1-release-gate.test.mjs

      - name: Run V1 validation status report tests
        run: node --test scripts/v1-validation-status.test.mjs

      - name: Run V1 UAT action plan tests
        run: node --test scripts/v1-uat-action-plan.test.mjs

      - name: Run V1 UAT execution pack tests
        run: node --test scripts/v1-uat-execution-pack.test.mjs

      - name: Run V1 Go No-Go meeting pack tests
        run: node --test scripts/v1-go-no-go-meeting.test.mjs

      - name: Run V1 kickoff governance closure intake tests
        run: node --test scripts/v1-kickoff-governance-closure-intake.test.mjs

      - name: Generate V1 kickoff governance closure intake
        run: node scripts/v1-kickoff-governance-closure-intake.mjs --output docs/meeting-notes/crm-kickoff-governance-closure-intake.md

      - name: Run V1 kickoff governance evidence pack tests
        run: node --test scripts/v1-kickoff-governance-evidence-pack.test.mjs

      - name: Generate V1 kickoff governance evidence pack
        run: node scripts/v1-kickoff-governance-evidence-pack.mjs --output docs/meeting-notes/evidence/kickoff/closure-evidence-pack.md

      - name: Run V1 kickoff governance evidence scaffold tests
        run: node --test scripts/v1-kickoff-governance-evidence-scaffold.test.mjs

      - name: Generate V1 kickoff governance evidence scaffolds
        run: node scripts/v1-kickoff-governance-evidence-scaffold.mjs --write

      - name: Run V1 kickoff governance evidence apply tests
        run: node --test scripts/v1-kickoff-governance-evidence-apply.test.mjs

      - name: Run V1 external UAT request packet tests
        run: node --test scripts/v1-external-uat-request.test.mjs

      - name: Generate V1 external UAT closure checklist
        run: node scripts/v1-external-uat-request.mjs --closure-checklist --output docs/testing/v1-external-uat-closure-checklist.md

      - name: Generate V1 external UAT evidence intake
        run: node scripts/v1-external-uat-request.mjs --evidence-intake --output docs/testing/v1-external-uat-evidence-intake.md

      - name: Generate V1 next closure phase handoff
        run: node scripts/v1-external-uat-request.mjs --next-closure-phase --output docs/testing/v1-next-closure-phase.md

      - name: Generate V1 external UAT blockers JSON
        run: node scripts/v1-external-uat-request.mjs --json --output docs/testing/v1-external-uat-blockers.json

      - name: Run V1 progress TODO tests
        run: node --test scripts/v1-progress-todo.test.mjs

      - name: Generate V1 progress TODO board
        run: node scripts/v1-progress-todo.mjs --output docs/testing/v1-progress-todo.md

      - name: Run V1 generated docs consistency tests
        run: node --test scripts/v1-generated-docs-check.test.mjs

      - name: Validate V1 generated docs consistency
        run: node scripts/v1-generated-docs-check.mjs

      - name: Run V1 release gate status JSON tests
        run: node --test scripts/v1-release-gate-status-check.test.mjs

      - name: Validate V1 release gate status JSON
        run: node scripts/v1-release-gate-status-check.mjs

      - name: Run V1 plan status consistency tests
        run: node --test scripts/v1-plan-status-check.test.mjs

      - name: Validate V1 plan status consistency
        run: node scripts/v1-plan-status-check.mjs

      - name: Run V1 acceptance checklist consistency tests
        run: node --test scripts/v1-acceptance-checklist-check.test.mjs

      - name: Validate V1 acceptance checklist consistency
        run: node scripts/v1-acceptance-checklist-check.mjs

      - name: Run V1 UAT coverage tests
        run: node --test scripts/v1-uat-coverage-check.test.mjs

      - name: Validate V1 UAT coverage
        run: node scripts/v1-uat-coverage-check.mjs

      - name: Run V1 traceability consistency tests
        run: node --test scripts/v1-traceability-check.test.mjs

      - name: Validate V1 traceability consistency
        run: node scripts/v1-traceability-check.mjs

      - name: Run V1 blocker consistency tests
        run: node --test scripts/v1-blocker-consistency-check.test.mjs

      - name: Validate V1 blocker consistency
        run: node scripts/v1-blocker-consistency-check.mjs

      - name: Run V1 external UAT request coverage tests
        run: node --test scripts/v1-external-uat-request-coverage-check.test.mjs

      - name: Validate V1 external UAT request coverage
        run: node scripts/v1-external-uat-request-coverage-check.mjs

      - name: Run V1 final evidence handoff tests
        run: node --test scripts/v1-final-evidence-handoff-check.test.mjs

      - name: Validate V1 final evidence handoff
        run: node scripts/v1-final-evidence-handoff-check.mjs

      - name: Run V1 secret scan tests
        run: node --test scripts/v1-secret-scan-check.test.mjs

      - name: Validate V1 secret scan
        run: node scripts/v1-secret-scan-check.mjs

      - name: Validate V1 UAT evidence pack generator
        run: node scripts/v1-uat-evidence-pack.mjs --environment ci-v1-uat-template --frontend-url https://crm.example.invalid --backend-url https://crm-api.example.invalid --git-commit "$GITHUB_SHA" --rc ci-snapshot --test-owner QA --product-owner Product --dev-owner Dev --username demo_admin

  backend:
    name: Backend tests and PostgreSQL migration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend test suite
        run: mvn -B test

      - name: Run PostgreSQL integration verification
        run: mvn -B verify -Ppostgres-it

  frontend:
    name: Frontend tests and production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend test suite
        run: npm test

      - name: Run V1 readiness checker tests
        run: node --test ../scripts/v1-uat-readiness-check.test.mjs

      - name: Build frontend
        run: npm run build
