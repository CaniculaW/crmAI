          format: int64
        opportunity_name:
          type: string
        stage:
          type: string
        status:
          type: string
        contact_relations:
          type: array
          items:
            type: object
    ActivityCreateRequest:
      type: object
      required: [account_id, subject, activity_type, activity_status, activity_result, activity_time, owner_department_id, owner_user_id]
      properties:
        account_id:
          type: integer
          format: int64
        opportunity_id:
          type: integer
          format: int64
        subject:
          type: string
        activity_type:
          type: string
        activity_status:
          type: string
        activity_result:
          type: string
        activity_time:
          type: string
          format: date-time
        next_follow_up_at:
          type: string
          format: date-time
