    ReceivablePlanResponse:
      type: object
      required: [id, account_id, contract_id, plan_name, receivable_status, planned_amount, owner_user_id]
      additionalProperties: true
      properties:
        id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        opportunity_id:
          type: integer
          format: int64
          nullable: true
        contract_id:
          type: integer
          format: int64
        plan_name:
          type: string
        receivable_status:
          type: string
        planned_receivable_date:
          type: string
          format: date-time
          nullable: true
        planned_amount:
          type: number
        owner_user_id:
          type: integer
          format: int64
    DashboardRiskItem:
      type: object
      required: [risk_type, title, drilldown_url]
      additionalProperties: true
      properties:
        risk_type:
          type: string
        risk_level:
          type: string
          nullable: true
        title:
          type: string
        amount:
          type: number
          nullable: true
        object_type:
          type: string
          nullable: true
        object_id:
          type: integer
          format: int64
          nullable: true
        occurred_at:
          type: string
          format: date-time
          nullable: true
        drilldown_url:
          type: string
    ApiBootstrapResponse:
      type: object
      required: [code, message, data, trace_id]
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/BootstrapResponse'
        trace_id:
          type: string
          example: v1-bootstrap-smoke
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    BootstrapResponse:
      type: object
      required: [user, permissions_count, v1_counts]
      properties:
        user:
          $ref: '#/components/schemas/CurrentUser'
        permissions_count:
          type: integer
        v1_counts:
          type: object
          additionalProperties:
            type: integer
          example:
            departments: 1
            users: 1
            roles: 1
            accounts: 0
            contacts: 0
            opportunities: 0
            activities: 0
    CurrentUser:
      type: object
      required: [id, name, email, roles, permissions]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: object
            required: [id, code, name]
            properties:
              id:
                type: integer
                format: int64
              code:
                type: string
              name:
                type: string
        permissions:
          type: array
          items:
            type: string
