          type: integer
          format: int64
        opportunity_id:
          type: integer
          format: int64
        document_name:
          type: string
        document_type:
          type: string
        version_no:
          type: string
        status:
          type: string
        owner_user_id:
          type: integer
          format: int64
    ContractResponse:
      type: object
      required: [id, account_id, contract_name, contract_type, contract_status, contract_amount, owner_user_id]
      additionalProperties: true
      properties:
        id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        opportunity_id:
          type: integer
          format: int64
          nullable: true
        contract_name:
          type: string
        contract_type:
          type: string
        contract_status:
          type: string
        contract_amount:
          type: number
        owner_user_id:
          type: integer
          format: int64
        risk_level:
          type: string
