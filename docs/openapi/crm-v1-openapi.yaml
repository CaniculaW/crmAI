components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    DictCode:
      name: dict_code
      in: query
      schema:
        type: string
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    OpportunityId:
      name: opportunityId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ActivityId:
      name: activityId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ApiBootstrapResponse:
      type: object
      required: [code, message, data, trace_id]
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/BootstrapResponse'
        trace_id:
          type: string
          example: v1-bootstrap-smoke
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    BootstrapResponse:
      type: object
      required: [user, permissions_count, v1_counts]
      properties:
        user:
          $ref: '#/components/schemas/CurrentUser'
        permissions_count:
          type: integer
        v1_counts:
          type: object
          additionalProperties:
            type: integer
          example:
            departments: 1
            users: 1
            roles: 1
            accounts: 0
            contacts: 0
            opportunities: 0
            activities: 0
    CurrentUser:
      type: object
      required: [id, name, email, roles, permissions]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: object
            required: [id, code, name]
            properties:
              id:
                type: integer
                format: int64
              code:
                type: string
              name:
                type: string
        permissions:
          type: array
          items:
            type: string
    AccountCreateRequest:
      type: object
      required: [account_name, account_type, account_status, owner_department_id, owner_user_id]
      properties:
        account_name:
          type: string
        account_type:
          type: string
        account_status:
          type: string
        owner_department_id:
          type: integer
          format: int64
        owner_user_id:
          type: integer
          format: int64
        collaborators:
          type: array
          items:
            type: object
    ContactCreateRequest:
      type: object
      required: [account_id, name]
      properties:
        account_id:
          type: integer
          format: int64
        name:
          type: string
        project_roles:
          type: array
          items:
            type: string
    OpportunityCreateRequest:
      type: object
      required: [account_id, opportunity_name, stage, status, owner_department_id, owner_user_id]
      properties:
        account_id:
          type: integer
          format: int64
        opportunity_name:
          type: string
        stage:
          type: string
        status:
          type: string
        contact_relations:
          type: array
          items:
            type: object
    ActivityCreateRequest:
      type: object
      required: [account_id, subject, activity_type, activity_status, activity_result, activity_time, owner_department_id, owner_user_id]
      properties:
        account_id:
          type: integer
          format: int64
        opportunity_id:
          type: integer
          format: int64
        subject:
          type: string
        activity_type:
          type: string
        activity_status:
          type: string
        activity_result:
          type: string
        activity_time:
          type: string
          format: date-time
        next_follow_up_at:
          type: string
          format: date-time
