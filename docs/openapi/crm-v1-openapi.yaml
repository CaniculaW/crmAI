          type: integer
          format: int64
        opportunity_id:
          type: integer
          format: int64
          nullable: true
        subject:
          type: string
        activity_type:
          type: string
        activity_status:
          type: string
        activity_result:
          type: string
        activity_time:
          type: string
          format: date-time
        owner_department_id:
          type: integer
          format: int64
        owner_user_id:
          type: integer
          format: int64
        conclusion:
          type: string
          nullable: true
        customer_feedback:
