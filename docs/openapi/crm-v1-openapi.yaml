                reconciled_at:
                  type: string
                  format: date-time
                reconcile_note:
                  type: string
      responses:
        '200':
          description: Reconciliation detail.
  /api/reconciliations/{reconciliationId}:
    get:
      tags: [Reconciliations]
      summary: Get reconciliation detail
      parameters:
        - name: reconciliationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Reconciliation detail.
  /api/reconciliations/{reconciliationId}/void:
    post:
      tags: [Reconciliations]
      summary: Void reconciliation
      parameters:
        - name: reconciliationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [void_reason]
              properties:
                void_reason:
                  type: string
      responses:
        '200':
          description: Reconciliation detail.
  /api/attachments:
    get:
      tags: [Attachments]
      summary: List attachments by business object
      parameters:
        - name: object_type
          in: query
          required: true
          schema:
            type: string
        - name: object_id
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Attachment list.
    post:
      tags: [Attachments]
      summary: Create attachment metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Attachment metadata.
  /api/attachments/upload:
    post:
      tags: [Attachments]
      summary: Upload attachment file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [object_type, object_id, file]
              properties:
                object_type:
                  type: string
                object_id:
                  type: integer
                  format: int64
                file:
                  type: string
                  format: binary
                file_type:
                  type: string
                remark:
                  type: string
      responses:
        '200':
          description: Uploaded attachment metadata.
  /api/attachments/{attachmentId}:
    delete:
      tags: [Attachments]
      summary: Delete attachment metadata
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Deletion result.
  /api/attachments/{attachmentId}/download:
    get:
      tags: [Attachments]
      summary: Download uploaded attachment file
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Attachment binary stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /api/reminders:
    get:
      tags: [Reminders]
      summary: List current user's reminders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, cancelled]
        - name: overdue
          in: query
          schema:
            type: boolean
        - name: object_type
          in: query
          schema:
            type: string
        - name: object_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Reminder list.
  /api/reminders/{reminderId}:
    patch:
      tags: [Reminders]
      summary: Complete or cancel reminder
      parameters:
        - name: reminderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [completed, cancelled]
      responses:
        '200':
          description: Reminder detail.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    DictCode:
      name: dict_code
      in: query
      schema:
        type: string
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    OpportunityId:
      name: opportunityId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ActivityId:
      name: activityId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ApiAiContextSummaryResponse:
      type: object
      required: [code, message, data, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/AiContextSummary'
        trace_id:
          type: string
    ApiAiAccountContextResponse:
      type: object
      required: [code, message, data, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/AiAccountContext'
        trace_id:
          type: string
    ApiAiOpportunityContextResponse:
      type: object
      required: [code, message, data, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/AiOpportunityContext'
        trace_id:
          type: string
    AiEvidenceItem:
      type: object
      required: [object_type, object_id, title, drilldown_url]
      properties:
        object_type:
          type: string
        object_id:
          type: integer
          format: int64
        title:
          type: string
        summary:
          type: string
          nullable: true
        occurred_at:
          type: string
          format: date-time
          nullable: true
        drilldown_url:
          type: string
    AiContextSummary:
      type: object
      required: [accounts, opportunities, recent_activities, risk_signals, evidence]
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'
        opportunities:
          type: array
          items:
            $ref: '#/components/schemas/OpportunityResponse'
        recent_activities:
          type: array
          items:
            $ref: '#/components/schemas/ActivityResponse'
        risk_signals:
          type: array
          items:
            $ref: '#/components/schemas/DashboardRiskItem'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/AiEvidenceItem'
    AiAccountContext:
      type: object
      required: [account, contacts, opportunities, recent_activities, solutions, contracts, receivables, evidence]
      properties:
        account:
          $ref: '#/components/schemas/AccountResponse'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactResponse'
        opportunities:
          type: array
          items:
            $ref: '#/components/schemas/OpportunityResponse'
        recent_activities:
          type: array
          items:
            $ref: '#/components/schemas/ActivityResponse'
        solutions:
          type: array
          items:
            $ref: '#/components/schemas/SolutionDocumentResponse'
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/ContractResponse'
        receivables:
          type: array
          items:
            $ref: '#/components/schemas/ReceivablePlanResponse'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/AiEvidenceItem'
    AiOpportunityContext:
      type: object
      required: [opportunity, account, contacts, recent_activities, solutions, contracts, receivables, evidence]
      properties:
        opportunity:
          $ref: '#/components/schemas/OpportunityResponse'
        account:
          $ref: '#/components/schemas/AccountResponse'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactResponse'
        recent_activities:
          type: array
          items:
            $ref: '#/components/schemas/ActivityResponse'
        solutions:
          type: array
          items:
            $ref: '#/components/schemas/SolutionDocumentResponse'
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/ContractResponse'
        receivables:
          type: array
          items:
            $ref: '#/components/schemas/ReceivablePlanResponse'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/AiEvidenceItem'
    ApiAiDraftParseResponse:
      type: object
      required: [code, message, data, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/AiDraftParseResponse'
        trace_id:
          type: string
    ApiAiDraftListResponse:
      type: object
      required: [code, message, data, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/AiDraft'
        trace_id:
          type: string
    ApiAiDraftResponse:
      type: object
      required: [code, message, data, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/AiDraft'
        trace_id:
          type: string
    AiDraftParseRequest:
      type: object
      required: [source_text]
      properties:
        source_text:
          type: string
    AiDraftRejectRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 512
    AiDraftParseResponse:
      type: object
      required: [input_record_id, drafts]
      properties:
        input_record_id:
          type: integer
          format: int64
        drafts:
          type: array
          items:
            $ref: '#/components/schemas/AiDraft'
    AiDraft:
      type: object
      required: [id, input_record_id, draft_type, status, target_action, source_text, payload, missing_fields, conflicts, confidence_status]
      properties:
        id:
          type: integer
          format: int64
        input_record_id:
          type: integer
          format: int64
        draft_type:
          type: string
          enum: [account, contact, opportunity, activity, unknown]
        status:
          type: string
          enum: [pending_confirmation, need_more_info, confirmed, rejected]
        target_action:
          type: string
        source_text:
          type: string
        payload:
          type: object
          additionalProperties: true
        missing_fields:
          type: array
          items:
            type: string
        conflicts:
          type: array
          items:
            type: string
        confidence_status:
          type: string
        write_object_type:
          type: string
          nullable: true
        write_object_id:
          type: integer
          format: int64
          nullable: true
        rejection_reason:
          type: string
          nullable: true
    AccountResponse:
      type: object
      required: [id, account_name, account_type, account_status, owner_department_id, owner_user_id]
      additionalProperties: true
      properties:
        id:
          type: integer
          format: int64
        account_name:
          type: string
        account_type:
          type: string
        account_level:
          type: string
          nullable: true
        account_status:
          type: string
        owner_department_id:
          type: integer
          format: int64
        owner_user_id:
          type: integer
          format: int64
        last_activity_summary:
          type: string
          nullable: true
        last_activity_at:
          type: string
          format: date-time
          nullable: true
    ContactResponse:
      type: object
