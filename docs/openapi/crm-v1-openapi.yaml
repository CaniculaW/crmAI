openapi: 3.0.3
info:
  title: Canicula CRM V1 API
  version: 0.1.0
  description: Project-based key account CRM V1 interface contract.
servers:
  - url: /api
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: System
  - name: Accounts
  - name: Contacts
  - name: Opportunities
  - name: SolutionDocuments
  - name: Contracts
  - name: Invoices
  - name: Receivables
  - name: Payments
  - name: Activities
  - name: WeeklyProgress
  - name: Attachments
  - name: Reminders
  - name: Dashboard
paths:
  /api/health:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is alive.
  /api/bootstrap:
    get:
      tags: [System]
      summary: Current session bootstrap and V1 smoke counts
      responses:
        '200':
          description: Current user permissions and key V1 entity counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiBootstrapResponse'
  /api/dashboard/overview:
    get:
      tags: [Dashboard]
      summary: V3 management dashboard overview
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: department_id
          in: query
          schema:
            type: integer
            format: int64
        - name: owner_id
          in: query
          schema:
            type: integer
            format: int64
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Dashboard overview metrics, flow, and risks.
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with username and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access token and current user.
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current user profile, roles, and permissions
      responses:
        '200':
          description: Current user.
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      responses:
        '200':
          description: Logout result.
  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Password changed.
  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset a user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Password reset.
  /api/system/dicts:
    get:
      tags: [System]
      summary: List dictionary types and items
      parameters:
        - $ref: '#/components/parameters/DictCode'
        - name: include_inactive
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Dictionary list.
  /api/system/dicts/types:
    post:
      tags: [System]
      summary: Create dictionary type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Dictionary type.
  /api/system/dicts/types/{dictTypeId}/items:
    post:
      tags: [System]
      summary: Create dictionary item
      parameters:
        - name: dictTypeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Dictionary item.
  /api/system/dicts/items/{itemId}:
    patch:
      tags: [System]
      summary: Update dictionary item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Dictionary item.
  /api/system/audit-logs:
    get:
      tags: [System]
      summary: List audit logs
      parameters:
        - name: module_code
          in: query
          schema:
            type: string
        - name: action_code
          in: query
          schema:
            type: string
        - name: object_type
          in: query
          schema:
            type: string
        - name: object_id
          in: query
          schema:
            type: integer
            format: int64
        - name: actor_user_id
          in: query
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Audit log list.
  /api/system/users:
    get:
      tags: [System]
      summary: List system users with assigned roles
      responses:
        '200':
          description: User list.
    post:
      tags: [System]
      summary: Create a system user with login account and assigned roles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [department_id, name, login_username, initial_password]
              properties:
                department_id:
                  type: integer
                  format: int64
                name:
                  type: string
                mobile:
                  type: string
                email:
                  type: string
                role_code:
                  type: string
                status:
                  type: string
                login_username:
                  type: string
                initial_password:
                  type: string
                  format: password
                role_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: Created user.
  /api/system/users/{userId}:
    put:
      tags: [System]
      summary: Update a system user and replace assigned roles
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                department_id:
                  type: integer
                  format: int64
                name:
                  type: string
                mobile:
                  type: string
                email:
                  type: string
                role_code:
                  type: string
                status:
                  type: string
                role_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: Updated user.
  /api/system/departments:
    get:
      tags: [System]
      summary: List system departments
      responses:
        '200':
          description: Department list.
    post:
      tags: [System]
      summary: Create a system department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                parent_id:
                  type: integer
                  format: int64
                code:
                  type: string
                name:
                  type: string
                region_code:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Created department.
  /api/system/roles:
    get:
      tags: [System]
      summary: List roles with granted permission codes
      responses:
        '200':
          description: Role list.
  /api/system/permissions:
    get:
      tags: [System]
      summary: List active permissions
      responses:
        '200':
          description: Permission list.
  /api/system/roles/{roleId}/permissions:
    put:
      tags: [System]
      summary: Replace a role's granted permissions
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission_codes]
              properties:
                permission_codes:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated role.
  /api/accounts:
    get:
      tags: [Accounts]
      summary: List readable accounts
      parameters:
        - $ref: '#/components/parameters/Keyword'
        - name: account_type
          in: query
          schema:
            type: string
        - name: account_level
          in: query
          schema:
            type: string
        - name: account_status
          in: query
          schema:
            type: string
        - name: account_source
          in: query
          schema:
            type: string
        - name: owner_user_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Account list.
    post:
      tags: [Accounts]
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '200':
          description: Account detail.
  /api/accounts/{accountId}:
    get:
      tags: [Accounts]
      summary: Get account detail
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Account detail.
    patch:
      tags: [Accounts]
      summary: Update account
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Account detail.
  /api/accounts/{accountId}/contacts:
    get:
      tags: [Contacts]
      summary: List readable contacts under account
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Contact list.
  /api/accounts/{accountId}/opportunities:
    get:
      tags: [Opportunities]
      summary: List readable opportunities under account
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Opportunity list.
  /api/accounts/{accountId}/activities:
    get:
      tags: [Activities]
      summary: List readable activities under account
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Activity list.
  /api/contacts:
    get:
      tags: [Contacts]
      summary: List readable contacts
      parameters:
        - $ref: '#/components/parameters/Keyword'
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: project_role
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Contact list.
    post:
      tags: [Contacts]
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreateRequest'
      responses:
        '200':
          description: Contact detail.
  /api/contacts/{contactId}:
    get:
      tags: [Contacts]
      summary: Get contact detail
      parameters:
        - $ref: '#/components/parameters/ContactId'
      responses:
        '200':
          description: Contact detail.
    patch:
      tags: [Contacts]
      summary: Update contact
      parameters:
        - $ref: '#/components/parameters/ContactId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Contact detail.
  /api/opportunities:
    get:
      tags: [Opportunities]
      summary: List readable opportunities
      parameters:
        - $ref: '#/components/parameters/Keyword'
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: default_following
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Opportunity list.
    post:
      tags: [Opportunities]
      summary: Create opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpportunityCreateRequest'
      responses:
        '200':
          description: Opportunity detail.
  /api/opportunities/{opportunityId}:
    get:
      tags: [Opportunities]
      summary: Get opportunity detail
      parameters:
        - $ref: '#/components/parameters/OpportunityId'
      responses:
        '200':
          description: Opportunity detail.
    patch:
      tags: [Opportunities]
      summary: Update opportunity
      parameters:
        - $ref: '#/components/parameters/OpportunityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Opportunity detail.
  /api/opportunities/{opportunityId}/close:
    post:
      tags: [Opportunities]
      summary: Close, lose, or cancel opportunity
      parameters:
        - $ref: '#/components/parameters/OpportunityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Opportunity detail.
  /api/opportunities/{opportunityId}/reopen:
    post:
      tags: [Opportunities]
      summary: Reopen closed opportunity
      parameters:
        - $ref: '#/components/parameters/OpportunityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Opportunity detail.
  /api/opportunities/{opportunityId}/activities:
    get:
      tags: [Activities]
      summary: List readable activities under opportunity
      parameters:
        - $ref: '#/components/parameters/OpportunityId'
      responses:
        '200':
          description: Activity list.
  /api/opportunities/{opportunityId}/weekly-progress:
    get:
      tags: [WeeklyProgress]
      summary: List weekly progress for one opportunity
      parameters:
        - $ref: '#/components/parameters/OpportunityId'
        - name: week_start
          in: query
          schema:
            type: string
            format: date
        - name: week_end
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Weekly progress list.
  /api/activities:
    get:
      tags: [Activities]
      summary: List readable activities
      parameters:
        - $ref: '#/components/parameters/Keyword'
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
        - name: overdue
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Activity list.
    post:
      tags: [Activities]
      summary: Create activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCreateRequest'
      responses:
        '200':
          description: Activity detail.
  /api/activities/{activityId}:
    get:
      tags: [Activities]
      summary: Get activity detail
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '200':
          description: Activity detail.
    patch:
      tags: [Activities]
      summary: Update activity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Activity detail.
  /api/activities/{activityId}/complete:
    post:
      tags: [Activities]
      summary: Complete activity and backfill account or opportunity progress
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Activity detail.
  /api/weekly-progress/opportunities:
    get:
      tags: [WeeklyProgress]
      summary: List opportunity weekly progress
      parameters:
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
        - name: owner_user_id
          in: query
          schema:
            type: integer
            format: int64
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: week_start
          in: query
          schema:
            type: string
            format: date
        - name: week_end
          in: query
          schema:
            type: string
            format: date
        - name: month
          in: query
          schema:
            type: string
            example: '2026-06'
        - name: risk_only
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Weekly progress list.
  /api/solutions:
    get:
      tags: [SolutionDocuments]
      summary: List solution documents
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
        - name: document_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: bid_self_check_result
          in: query
          schema:
            type: string
        - name: owner_user_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Solution document list.
    post:
      tags: [SolutionDocuments]
      summary: Create solution document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Solution document detail.
  /api/solutions/{solutionId}:
    get:
      tags: [SolutionDocuments]
      summary: Get solution document detail
      parameters:
        - name: solutionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Solution document detail.
    patch:
      tags: [SolutionDocuments]
      summary: Update solution document
      parameters:
        - name: solutionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Solution document detail.
  /api/solutions/{solutionId}/void:
    post:
      tags: [SolutionDocuments]
      summary: Void solution document
      parameters:
        - name: solutionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [void_reason]
              properties:
                void_reason:
                  type: string
      responses:
        '200':
          description: Solution document detail.
  /api/contracts:
    get:
      tags: [Contracts]
      summary: List contracts
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
        - name: contract_type
          in: query
          schema:
            type: string
        - name: contract_status
          in: query
          schema:
            type: string
        - name: risk_level
          in: query
          schema:
            type: string
        - name: owner_user_id
          in: query
          schema:
            type: integer
            format: int64
        - name: business_owner_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Contract list.
    post:
      tags: [Contracts]
      summary: Create contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Contract detail.
  /api/contracts/{contractId}:
    get:
      tags: [Contracts]
      summary: Get contract detail
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Contract detail.
    patch:
      tags: [Contracts]
      summary: Update contract
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Contract detail.
  /api/contracts/{contractId}/terminate:
    post:
      tags: [Contracts]
      summary: Terminate contract
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [termination_reason]
              properties:
                termination_reason:
                  type: string
      responses:
        '200':
          description: Contract detail.
  /api/contracts/{contractId}/changes:
    get:
      tags: [Contracts]
      summary: List contract changes
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Contract change list.
  /api/contracts/{contractId}/milestones:
    get:
      tags: [Contracts]
      summary: List contract milestones
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Contract milestone list.
    post:
      tags: [Contracts]
      summary: Create contract milestone
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Contract milestone detail.
  /api/contracts/{contractId}/milestones/{milestoneId}:
    patch:
      tags: [Contracts]
      summary: Update contract milestone
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: milestoneId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Contract milestone detail.
  /api/invoices:
    get:
      tags: [Invoices]
      summary: List invoice plans and records
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
        - name: contract_id
          in: query
          schema:
            type: integer
            format: int64
        - name: invoice_status
          in: query
          schema:
            type: string
        - name: invoice_type
          in: query
          schema:
            type: string
        - name: owner_user_id
          in: query
          schema:
            type: integer
            format: int64
        - name: planned_from
          in: query
          schema:
            type: string
            format: date-time
        - name: planned_to
          in: query
          schema:
            type: string
            format: date-time
        - name: invoice_date_from
          in: query
          schema:
            type: string
            format: date-time
        - name: invoice_date_to
          in: query
          schema:
            type: string
            format: date-time
        - name: exception_only
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Invoice list.
    post:
      tags: [Invoices]
      summary: Create invoice plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Invoice detail.
  /api/invoices/{invoiceId}:
    get:
      tags: [Invoices]
      summary: Get invoice detail
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Invoice detail.
    patch:
      tags: [Invoices]
      summary: Update invoice plan
