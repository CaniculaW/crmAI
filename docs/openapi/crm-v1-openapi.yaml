openapi: 3.0.3
info:
  title: Canicula CRM V1 API
  version: 0.1.0
  description: Project-based key account CRM V1 interface contract.
servers:
  - url: /api
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: System
  - name: Accounts
  - name: Contacts
  - name: Opportunities
  - name: SolutionDocuments
  - name: Contracts
  - name: Invoices
  - name: Receivables
  - name: Payments
  - name: Activities
  - name: WeeklyProgress
  - name: Attachments
  - name: Reminders
  - name: Dashboard
  - name: AI Context
  - name: AI Drafts
paths:
  /api/health:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is alive.
  /api/bootstrap:
    get:
      tags: [System]
      summary: Current session bootstrap and V1 smoke counts
      responses:
        '200':
          description: Current user permissions and key V1 entity counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiBootstrapResponse'
  /api/dashboard/overview:
    get:
      tags: [Dashboard]
      summary: V3 management dashboard overview
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: department_id
          in: query
          schema:
            type: integer
            format: int64
        - name: owner_id
          in: query
          schema:
            type: integer
            format: int64
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Dashboard overview metrics, flow, and risks.
  /api/dashboard/funnel:
    get:
      tags: [Dashboard]
      summary: V3 sales funnel and forecast dashboard
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: department_id
          in: query
          schema:
            type: integer
            format: int64
        - name: owner_id
          in: query
          schema:
            type: integer
            format: int64
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: risk_status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Sales funnel stages, forecast trend, and attention opportunities.
  /api/dashboard/contracts:
    get:
      tags: [Dashboard]
      summary: V3 contract execution dashboard
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: department_id
          in: query
          schema:
            type: integer
            format: int64
        - name: owner_id
          in: query
          schema:
            type: integer
            format: int64
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
        - name: contract_status
          in: query
          schema:
            type: string
        - name: risk_level
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Contract metrics, status distribution, milestones, changes, and attention contracts.
  /api/dashboard/invoices:
    get:
      tags: [Dashboard]
      summary: V3 invoice execution dashboard
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: department_id
          in: query
          schema:
            type: integer
            format: int64
        - name: owner_id
          in: query
          schema:
            type: integer
            format: int64
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
        - name: contract_id
          in: query
          schema:
            type: integer
            format: int64
        - name: invoice_status
          in: query
          schema:
            type: string
        - name: exception_only
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Invoice metrics, status distribution, gap trend, risk summary, and attention invoices.
  /api/dashboard/receivables:
    get:
      tags: [Dashboard]
      summary: V3 receivable and reconciliation dashboard
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: department_id
          in: query
          schema:
            type: integer
            format: int64
        - name: owner_id
          in: query
          schema:
            type: integer
            format: int64
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
        - name: contract_id
          in: query
          schema:
            type: integer
            format: int64
        - name: receivable_status
          in: query
          schema:
            type: string
        - name: overdue_only
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Receivable metrics, status distribution, gap trend, reconciliation summary, and attention receivables.
          content:
            application/json:
              schema:
                type: object
                required: [filters, metric_cards, status_distribution, gap_trend, reconciliation_summary, attention_receivables]
                properties:
                  filters:
                    type: object
                    additionalProperties: true
                  metric_cards:
                    type: array
                    items:
                      type: object
                      required: [key, label, value, unit, drilldown_url]
                      properties:
                        key:
                          type: string
                        label:
                          type: string
                        value:
                          type: number
                        unit:
                          type: string
                        drilldown_url:
                          type: string
                  status_distribution:
                    type: array
                    items:
                      type: object
                      required: [status, label, count, amount, ratio, drilldown_url]
                      properties:
                        status:
                          type: string
                        label:
                          type: string
                        count:
                          type: integer
                        amount:
                          type: number
                        ratio:
                          type: number
                        drilldown_url:
                          type: string
                  gap_trend:
                    type: array
                    items:
                      type: object
                      required: [bucket, planned_amount, confirmed_received_amount, unreceived_amount, overdue_amount, drilldown_url]
                      properties:
                        bucket:
                          type: string
                        planned_amount:
                          type: number
                        confirmed_received_amount:
                          type: number
                        unreceived_amount:
                          type: number
                        overdue_amount:
                          type: number
                        drilldown_url:
                          type: string
                  reconciliation_summary:
                    type: array
                    items:
                      type: object
                      required: [key, label, count, amount, risk_level, drilldown_url]
                      properties:
                        key:
                          type: string
                        label:
                          type: string
                        count:
                          type: integer
                        amount:
                          type: number
                        risk_level:
                          type: string
                        drilldown_url:
                          type: string
                  attention_receivables:
                    type: array
                    items:
                      type: object
                      required: [object_type, object_id, object_name, account_id, contract_id, owner_user_id, status, amount, reason, drilldown_url]
                      properties:
                        object_type:
                          type: string
                        object_id:
                          type: integer
                          format: int64
                        object_name:
                          type: string
                        account_id:
                          type: integer
                          format: int64
                        opportunity_id:
                          type: integer
                          format: int64
                          nullable: true
                        contract_id:
                          type: integer
                          format: int64
                        owner_user_id:
                          type: integer
                          format: int64
                        status:
                          type: string
                        amount:
                          type: number
                        due_at:
                          type: string
                          format: date-time
                          nullable: true
                        occurred_at:
                          type: string
                          format: date-time
                          nullable: true
                        reason:
                          type: string
                        drilldown_url:
                          type: string
  /api/dashboard/risks:
    get:
      tags: [Dashboard]
      summary: V3 risk warning and drilldown dashboard
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: department_id
          in: query
          schema:
            type: integer
            format: int64
        - name: owner_id
          in: query
          schema:
            type: integer
            format: int64
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: opportunity_id
          in: query
          schema:
            type: integer
            format: int64
        - name: risk_type
          in: query
          schema:
            type: string
        - name: risk_level
          in: query
          schema:
            type: string
        - name: object_type
          in: query
          schema:
            type: string
        - name: high_priority_only
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Risk metric cards, summary, trend, owner ranking, and normalized risk work items.
          content:
            application/json:
              schema:
                type: object
                required: [filters, metric_cards, risk_summary, risk_trend, owner_ranking, risk_items]
                properties:
                  filters:
                    type: object
                    additionalProperties: true
                  metric_cards:
                    type: array
                    items:
                      type: object
                      required: [key, label, value, unit, drilldown_url]
                      properties:
                        key:
                          type: string
                        label:
                          type: string
                        value:
                          type: number
                        unit:
                          type: string
                        drilldown_url:
                          type: string
                  risk_summary:
                    type: array
                    items:
                      type: object
                      required: [risk_type, label, count, amount, highest_level, drilldown_url]
                      properties:
                        risk_type:
                          type: string
                        label:
                          type: string
                        count:
                          type: integer
                        amount:
                          type: number
                        highest_level:
                          type: string
                        drilldown_url:
                          type: string
                  risk_trend:
                    type: array
                    items:
                      type: object
                      required: [period, count, amount, high_count, drilldown_url]
                      properties:
                        period:
                          type: string
                        count:
                          type: integer
                        amount:
                          type: number
                        high_count:
                          type: integer
                        drilldown_url:
                          type: string
                  owner_ranking:
                    type: array
                    items:
                      type: object
                      required: [owner_user_id, owner_name, count, amount, highest_priority_score, drilldown_url]
                      properties:
                        owner_user_id:
                          type: integer
                          format: int64
                        owner_name:
                          type: string
                        count:
                          type: integer
                        amount:
                          type: number
                        highest_priority_score:
                          type: integer
                        drilldown_url:
                          type: string
                  risk_items:
                    type: array
                    items:
                      type: object
                      required: [risk_type, risk_label, risk_level, title, amount, object_type, object_id, owner_user_id, owner_name, account_id, account_name, priority_score, suggested_action, drilldown_url]
                      properties:
                        risk_type:
                          type: string
                        risk_label:
                          type: string
                        risk_level:
                          type: string
                        title:
                          type: string
                        amount:
                          type: number
                        object_type:
                          type: string
                        object_id:
                          type: integer
                          format: int64
                        owner_user_id:
                          type: integer
                          format: int64
                        owner_name:
                          type: string
                        account_id:
                          type: integer
                          format: int64
                        account_name:
                          type: string
                        opportunity_id:
                          type: integer
                          format: int64
                        priority_score:
                          type: integer
                        suggested_action:
                          type: string
                        occurred_at:
                          type: string
                          format: date-time
                        drilldown_url:
                          type: string
  /api/ai-context/summary:
    get:
      tags: [AI Context]
      summary: V4 AI sales context summary
      responses:
        '200':
          description: Current user's readable AI context summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAiContextSummaryResponse'
  /api/ai-context/accounts/{accountId}:
    get:
      tags: [AI Context]
      summary: V4 account-centered AI context
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Account-centered CRM context and evidence for AI assistance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAiAccountContextResponse'
  /api/ai-context/opportunities/{opportunityId}:
    get:
      tags: [AI Context]
      summary: V4 opportunity-centered AI context
      parameters:
        - $ref: '#/components/parameters/OpportunityId'
      responses:
        '200':
          description: Opportunity-centered CRM context and evidence for AI assistance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAiOpportunityContextResponse'
  /api/ai-drafts/parse:
    post:
      tags: [AI Drafts]
      summary: Parse sales text into confirmable CRM drafts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiDraftParseRequest'
      responses:
        '200':
          description: Generated AI extraction drafts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAiDraftParseResponse'
  /api/ai-drafts:
    get:
      tags: [AI Drafts]
      summary: List current user's AI drafts
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: AI extraction drafts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAiDraftListResponse'
  /api/ai-drafts/{draftId}/confirm:
    post:
      tags: [AI Drafts]
      summary: Confirm an AI draft and write CRM data
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Confirmed draft with write result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAiDraftResponse'
  /api/ai-drafts/{draftId}/reject:
    post:
      tags: [AI Drafts]
      summary: Reject an AI draft
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiDraftRejectRequest'
      responses:
        '200':
          description: Rejected draft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAiDraftResponse'
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with username and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access token and current user.
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current user profile, roles, and permissions
      responses:
        '200':
          description: Current user.
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      responses:
        '200':
          description: Logout result.
  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Password changed.
  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset a user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Password reset.
  /api/system/dicts:
    get:
      tags: [System]
      summary: List dictionary types and items
      parameters:
        - $ref: '#/components/parameters/DictCode'
        - name: include_inactive
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Dictionary list.
  /api/system/dicts/types:
    post:
      tags: [System]
      summary: Create dictionary type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Dictionary type.
  /api/system/dicts/types/{dictTypeId}/items:
    post:
      tags: [System]
      summary: Create dictionary item
      parameters:
        - name: dictTypeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Dictionary item.
  /api/system/dicts/items/{itemId}:
    patch:
      tags: [System]
      summary: Update dictionary item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Dictionary item.
  /api/system/audit-logs:
    get:
      tags: [System]
      summary: List audit logs
      parameters:
        - name: module_code
          in: query
          schema:
            type: string
        - name: action_code
          in: query
          schema:
            type: string
        - name: object_type
          in: query
          schema:
            type: string
        - name: object_id
          in: query
          schema:
            type: integer
            format: int64
        - name: actor_user_id
          in: query
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Audit log list.
  /api/system/users:
    get:
      tags: [System]
      summary: List system users with assigned roles
      responses:
        '200':
          description: User list.
    post:
      tags: [System]
      summary: Create a system user with login account and assigned roles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [department_id, name, login_username, initial_password]
              properties:
                department_id:
                  type: integer
                  format: int64
                name:
                  type: string
                mobile:
                  type: string
                email:
                  type: string
                role_code:
                  type: string
                status:
                  type: string
                login_username:
                  type: string
                initial_password:
                  type: string
                  format: password
                role_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: Created user.
  /api/system/users/{userId}:
    put:
      tags: [System]
      summary: Update a system user and replace assigned roles
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                department_id:
                  type: integer
                  format: int64
                name:
                  type: string
                mobile:
                  type: string
                email:
                  type: string
                role_code:
                  type: string
                status:
                  type: string
                role_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: Updated user.
  /api/system/departments:
    get:
      tags: [System]
      summary: List system departments
      responses:
        '200':
          description: Department list.
    post:
      tags: [System]
      summary: Create a system department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                parent_id:
                  type: integer
                  format: int64
                code:
                  type: string
                name:
                  type: string
                region_code:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Created department.
  /api/system/roles:
    get:
      tags: [System]
      summary: List roles with granted permission codes
      responses:
        '200':
          description: Role list.
  /api/system/permissions:
    get:
      tags: [System]
      summary: List active permissions
      responses:
        '200':
          description: Permission list.
  /api/system/roles/{roleId}/permissions:
    put:
      tags: [System]
      summary: Replace a role's granted permissions
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission_codes]
              properties:
                permission_codes:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated role.
  /api/accounts:
    get:
      tags: [Accounts]
      summary: List readable accounts
      parameters:
        - $ref: '#/components/parameters/Keyword'
        - name: account_type
          in: query
          schema:
            type: string
        - name: account_level
          in: query
          schema:
            type: string
        - name: account_status
          in: query
          schema:
            type: string
        - name: account_source
          in: query
          schema:
            type: string
        - name: owner_user_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Account list.
    post:
      tags: [Accounts]
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '200':
          description: Account detail.
  /api/accounts/{accountId}:
    get:
      tags: [Accounts]
      summary: Get account detail
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Account detail.
    patch:
      tags: [Accounts]
      summary: Update account
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Account detail.
  /api/accounts/{accountId}/contacts:
    get:
      tags: [Contacts]
      summary: List readable contacts under account
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Contact list.
  /api/accounts/{accountId}/opportunities:
    get:
      tags: [Opportunities]
      summary: List readable opportunities under account
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Opportunity list.
  /api/accounts/{accountId}/activities:
    get:
      tags: [Activities]
      summary: List readable activities under account
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Activity list.
  /api/contacts:
    get:
      tags: [Contacts]
      summary: List readable contacts
      parameters:
        - $ref: '#/components/parameters/Keyword'
        - name: account_id
          in: query
          schema:
            type: integer
            format: int64
        - name: project_role
          in: query
          schema:
            type: string
