spring:
  application:
    name: crm-ai-backend
  datasource:
    url: jdbc:h2:mem:crm_ai_${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      activeRecordFilter:
      approvalDefaultUniqueIndex: create index uk_approval_templates_default_active on approval_templates (tenant_id, object_type, is_default);
      approvalPendingUniqueIndex: create index uk_approval_instances_pending on approval_instances (tenant_id, object_type, object_id, status);
      jsonDataType: json

server:
  port: 0
