spring:
  application:
    name: crm-ai-backend
  datasource:
    url: jdbc:h2:mem:crm_ai_${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      activeRecordFilter:

server:
  port: 0
